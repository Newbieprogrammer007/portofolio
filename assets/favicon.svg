<!--
  File: assets/favicon.svg
  Tujuan: Aset favicon utama untuk identitas tab browser portfolio.
  Dipakai oleh: index.html melalui tag rel="icon".
  Dependensi utama: Tidak ada dependensi runtime; hanya dirender langsung oleh browser.
  Fungsi public/utama: Menyediakan ikon statis monogram "D" untuk tab, bookmark, dan shortcut browser.
  Side effect penting: Dirender browser sebagai favicon pada URL portfolio.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="faviconTitle">
  <title id="faviconTitle">Dimas Robby Candra Favicon</title>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="#1f1b17"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#d8b06a" stroke-width="2.5"/>
  <text
    x="32"
    y="39"
    text-anchor="middle"
    font-family="Georgia, Times New Roman, serif"
    font-size="28"
    font-weight="700"
    fill="#f8f4ec"
  >D</text>
</svg>
